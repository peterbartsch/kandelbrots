<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Kandelbrot</title>
  </head>
  <body>
    <!-- LEFT RAIL — navigation: search + the full board hierarchy -->
    <aside id="nav">
      <div id="nav-head">
        <div class="brand">KANDELBROT</div>
        <input id="tree-search" type="search" placeholder="Search tasks…" spellcheck="false" autocomplete="off" />
      </div>
      <div id="toolbar">
        <button id="open-dir-btn" type="button">Folder</button>
        <button id="import-btn" type="button">Import</button>
        <button id="export-btn" type="button">Export</button>
        <button id="mode-toggle" type="button">Navigate</button>
      </div>
      <div id="tree-wrap">
        <div class="pi-label">Board</div>
        <div id="tree"></div>
      </div>
      <div id="nav-foot">
        <div id="theme-wrap">
          <div class="pi-label">Theme</div>
          <select id="theme-select" aria-label="Theme"></select>
        </div>
        <div id="hud"></div>
      </div>
    </aside>

    <!-- CENTER — the spatial board -->
    <canvas id="stage"></canvas>

    <!-- RIGHT RAIL — inspector: details of whatever's in focus -->
    <aside id="panel">
      <nav id="pi-path" aria-label="Path"></nav>

      <div id="panel-info">
        <div id="pi-title"></div>
        <div id="pi-headline">
          <span id="pi-status" class="status-chip"></span>
          <span id="pi-pct"></span>
        </div>
        <div id="pi-bar">
          <span class="seg todo"></span>
          <span class="seg doing"></span>
          <span class="seg done"></span>
        </div>
        <div id="pi-legend"></div>
        <div id="pi-meta"></div>
        <button id="pi-pin" type="button"></button>
      </div>

      <div id="panel-tasks">
        <div class="pi-label" id="tasks-label">Tasks</div>
        <div id="task-list"></div>
        <button id="add-card" type="button">+ Add task</button>
      </div>
    </aside>

    <!-- mobile-only drawer controls (hidden on desktop via CSS) -->
    <button id="nav-toggle" type="button" aria-label="Board menu">Board</button>
    <button id="panel-toggle" type="button" aria-label="Focus details">Focus</button>
    <div id="drawer-scrim"></div>
    <input id="file-input" type="file" accept=".md,text/markdown" hidden />
    <div id="hint" class="overlay">drag to pan · scroll / pinch to zoom · Tab to arrange this card</div>
    <input id="rename-input" type="text" spellcheck="false" autocomplete="off" />
    <div id="scanlines"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
